# CC-Switch 配置文件模板 — 复制为 config.yaml 并填入你的密钥
# config/config.yaml 已被 .gitignore 排除，不会上传到 GitHub
providers:
  example-provider:
    display_name: Example
    base_url: https://api.example.com/v1
    api_key: YOUR_API_KEY_HERE
    model: your-model-name
    api_format: openai          # openai | deepseek | anthropic | google | nvidia
    enabled: true
    note:
    created_at: "2025-01-01 00:00:00"
    updated_at: "2025-01-01 00:00:00"

current_provider: example-provider

proxy:
  host: 127.0.0.1
  port: 3000
  virtual_model: virtual-model

ui_settings:
  enabled_clis:
    - claude_code
    - codex
    - gemini
    - hermes
  proxy_host: 127.0.0.1
  proxy_port: 3000
  virtual_model: virtual-model
